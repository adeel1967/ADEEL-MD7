<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="royalGradient" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc">
        <animate attributeName="stop-color" values="#ff00cc;#ff33ff;#cc33ff;#9933ff;#6633ff;#3333ff;#3366ff;#3399ff;#33ccff;#33ffff;#33ffcc;#33ff99;#33ff66;#33ff33;#99ff33;#ccff33;#ffff33;#ffcc33;#ff9933;#ff6633;#ff3333;#ff3366;#ff3399;#ff33cc;#ff33ff;#ff00cc" dur="20s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#33ff99">
        <animate attributeName="stop-color" values="#33ff99;#66ff99;#99ff99;#ccff99;#ffff99;#ffcc99;#ff9999;#ff6699;#ff3399;#ff0099;#ff00cc;#ff00ff;#cc00ff;#9900ff;#6600ff;#3300ff;#0000ff;#0033ff;#0066ff;#0099ff;#00ccff;#00ffff;#00ffcc;#00ff99;#00ff66;#00ff33;#00ff00;#33ff33;#33ff66;#33ff99" dur="20s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff00cc">
        <animate attributeName="stop-color" values="#ff00cc;#ff33ff;#cc33ff;#9933ff;#6633ff;#3333ff;#3366ff;#3399ff;#33ccff;#33ffff;#33ffcc;#33ff99;#33ff66;#33ff33;#99ff33;#ccff33;#ffff33;#ffcc33;#ff9933;#ff6633;#ff3333;#ff3366;#ff3399;#ff33cc;#ff33ff;#ff00cc" dur="20s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="15s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="pearlGradient" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="25%" stop-color="#ffaa00"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="75%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffd700"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    
    <linearGradient id="borderDiamond" x1="0%" y1="0%" x2="200%" y2="0%">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="20%" stop-color="#00ffff"/>
      <stop offset="40%" stop-color="#ffff00"/>
      <stop offset="60%" stop-color="#00ff00"/>
      <stop offset="80%" stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#ff00ff"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1,0" to="1,0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    
    <clipPath id="mainClip">
      <rect x="40" y="40" width="1120" height="320" rx="60"/>
      <path d="M600,360 L555,390 L585,345 Z"/>
    </clipPath>
  </defs>
  
  <rect width="1200" height="400" fill="#0a0a0f"/>
  <rect width="1200" height="400" fill="url(#royalGradient)" opacity="0.2"/>
  
  <rect x="40" y="40" width="1120" height="320" rx="60" fill="#000000" stroke="url(#borderDiamond)" stroke-width="8">
    <animate attributeName="stroke-width" values="8;12;8" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="60;70;60" dur="5s" repeatCount="indefinite"/>
  </rect>
  
  <path d="M600,360 L555,390 L585,345 Z" fill="#000000" stroke="url(#borderDiamond)" stroke-width="8"/>
  
  <g clip-path="url(#mainClip)">
    <circle cx="200" cy="120" r="8" fill="url(#pearlGradient)" opacity="0.9">
      <animate attributeName="cy" values="120;280;120" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="200;300;200" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;12;8" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="500" cy="200" r="10" fill="url(#pearlGradient)" opacity="0.9">
      <animate attributeName="cy" values="200;100;200" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="500;600;500" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="r" values="10;14;10" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="800" cy="160" r="9" fill="url(#pearlGradient)" opacity="0.9">
      <animate attributeName="cy" values="160;260;160" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="800;900;800" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="r" values="9;13;9" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="1000" cy="240" r="11" fill="url(#pearlGradient)" opacity="0.9">
      <animate attributeName="cy" values="240;140;240" dur="9.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="1000;900;1000" dur="10.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="11;15;11" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="350" cy="300" r="6" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="650" cy="100" r="5" fill="#00ffff" opacity="0.7">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;8;5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="850" cy="280" r="5.5" fill="#ff00ff" opacity="0.7">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5.5;8.5;5.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="450" cy="80" r="4" fill="#ffff00" opacity="0.6">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;7;4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <g text-anchor="middle" font-family="Trebuchet MS, Verdana, Arial, sans-serif">
    <text x="600" y="250" fill="#ffffff" font-size="100" font-weight="900" letter-spacing="4">
      WELCOME EVERYONE
    </text>
  </g>
  
  <rect x="0" y="0" width="1200" height="400" fill="url(#royalGradient)" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <circle cx="80" cy="80" r="12" fill="none" stroke="#ffff00" stroke-width="2">
    <animate attributeName="r" values="12;20;12" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="1120" cy="320" r="15" fill="none" stroke="#ff00ff" stroke-width="2">
    <animate attributeName="r" values="15;25;15" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="200" cy="360" r="8" fill="none" stroke="#00ffff" stroke-width="1.5">
    <animate attributeName="r" values="8;14;8" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
